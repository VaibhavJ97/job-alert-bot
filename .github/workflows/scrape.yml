name: Job Alert Scraper

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force_email:
        description: "Send email even if no new jobs (for testing)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    paths:
      - "urls.json"
      - "keywords.json"
    branches:
      - main

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the scraper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CV_TEXT: ${{ secrets.CV_TEXT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL_TO: ${{ secrets.DIGEST_EMAIL_TO }}
          FORCE_EMAIL: ${{ github.event.inputs.force_email || 'false' }}
        run: python scripts/fetch.py

      - name: Commit new snapshots and digest back to the repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshots/ digest/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto: update snapshots and digest [skip ci]"
            git push
          fi
